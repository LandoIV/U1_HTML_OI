<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportClub - Registro</title>
    <link rel="stylesheet" href="registro.css">
</head>
<body>

    <div class="caja">
        <img id="imagen-logo" src="../logo_empresa_letra_v1.png" alt="SportClub">
        
        <label>Nombre Completo</label>
        <input type="text" placeholder="Tu nombre">

        <label>Correo Electrónico</label>
        <input type="email" placeholder="ejemplo@correo.com">
        
        <label>Contraseña</label>
        <input type="password" placeholder="Crea una contraseña">

        <label>Deporte Favorito</label>
        <input type="text" placeholder="Ej: Fútbol, Natación...">

        <label>Nivel de Experiencia</label>
        <input type="text" placeholder="Principiante / Intermedio / Avanzado">
        
        <button id="boton-inicio">REGISTRARSE</button>
        
        <div class="links">
            <a href="../index.html">¿Ya tienes cuenta? Inicia sesión</a>
        </div>
    </div>

</body>
</html>
