<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportClub - Login</title>

    <!-- Fuente Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Estilos -->
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <!-- Logo -->
            <img src="../imagenes/logo_empresa_letra_v1.png" alt="Logo SportClub" class="logo">

            <!-- Título -->
            <h1>SportClub</h1>
            <p class="subtitle">Tu mejor versión comienza hoy</p>

            <!-- Formulario -->
            <form id="loginForm">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="********" required>

                <button type="submit" class="btn btn-login">Ingresar</button>
            </form>

            <!-- Botones de acceso a las interfaces -->
            <div class="roles">
                <p class="roles-title">Acceso rápido por perfil</p>
                <button class="btn btn-usuario" onclick="acceder('usuario')">Usuario</button>
                <button class="btn btn-coach" onclick="acceder('coach')">Coach</button>
                <button class="btn btn-admin" onclick="acceder('admin')">Administrador</button>
            </div>

            <!-- Enlaces adicionales -->
            <div class="links">
                <a href="../PaginaRecover/Recover.html">¿Olvidaste tu contraseña?</a>
                <a href="../Registro/registro.html">Crear una cuenta</a>
            </div>
        </div>
    </div>

    <!-- Script de redirección -->
    <script>
        // Redirección desde el formulario (por defecto a usuario)
        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const email = document.getElementById("email").value;
            localStorage.setItem("email", email);
            localStorage.setItem("rol", "usuario");
            window.location.href = "dashboard_usuario.html";
        });

        // Acceso rápido según perfil
        function acceder(rol) {
            const email = document.getElementById("email").value || "usuario@sportclub.cl";
            localStorage.setItem("email", email);
            localStorage.setItem("rol", rol);

            if (rol === "usuario") {
                window.location.href = "../Usuario/InterfazUsuario.html";
            } else if (rol === "coach") {
                window.location.href = "../Coach/InterfazCoach.html";
            } else if (rol === "admin") {
                window.location.href = "../Admin/InterfazAdmin.html";
            }
        }
    </script>

</body>
</html>
